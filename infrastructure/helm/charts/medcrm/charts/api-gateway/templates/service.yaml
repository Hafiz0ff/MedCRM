apiVersion: v1
kind: Service
metadata:
  name: { { .Chart.Name } }
  labels:
    app.kubernetes.io/name: { { .Chart.Name } }
    app.kubernetes.io/instance: { { .Release.Name } }
spec:
  type: ClusterIP
  ports:
    - port: { { .Values.port | default 3000 } }
      targetPort: http
      protocol: TCP
      name: http
    - port: { { .Values.metricsPort | default 3010 } }
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: { { .Chart.Name } }
    app.kubernetes.io/instance: { { .Release.Name } }
