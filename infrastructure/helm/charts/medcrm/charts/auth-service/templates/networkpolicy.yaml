{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        {{- if .Values.service.enabled }}
        - protocol: TCP
          port: {{ .Values.service.port }}
        {{- end }}
        {{- if and .Values.service.enabled .Values.service.tcpPort }}
        - protocol: TCP
          port: {{ .Values.service.tcpPort }}
        {{- end }}
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
{{- end -}}
