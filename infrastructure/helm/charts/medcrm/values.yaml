global:
  environment: production
  domain: medcrm.com
  imageRegistry: registry.medcrm.com
  imagePullPolicy: IfNotPresent

  database:
    host: postgres-postgresql.database.svc.cluster.local
    port: 5432
    name: medcrm
    ssl: true

  redis:
    host: redis-master.cache.svc.cluster.local
    port: 6379

  nats:
    url: nats://nats.messaging.svc.cluster.local:4222

  gatewayRegion: RU

# Microservice configuration defaults
api-gateway:
  enabled: true
  replicaCount: 2
  image:
    repository: medcrm/api-gateway
    tag: latest
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 256Mi

auth-service:
  enabled: true
  replicaCount: 2
  image:
    repository: medcrm/auth-service
    tag: latest
  resources:
    limits:
      cpu: 1500m
      memory: 2048Mi
    requests:
      cpu: 200m
      memory: 512Mi

scheduling-service:
  enabled: true
  replicaCount: 2
  image:
    repository: medcrm/scheduling-service
    tag: latest
  resources:
    limits:
      cpu: 1500m
      memory: 2048Mi
    requests:
      cpu: 200m
      memory: 512Mi

integrations-service:
  enabled: true
  replicaCount: 1
  image:
    repository: medcrm/integrations-service
    tag: latest
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 256Mi

analytics-service:
  enabled: true
  replicaCount: 1
  image:
    repository: medcrm/analytics-service
    tag: latest
  resources:
    limits:
      cpu: 2000m
      memory: 4096Mi
    requests:
      cpu: 500m
      memory: 1024Mi

billing-service:
  enabled: true
  replicaCount: 2
  image:
    repository: medcrm/billing-service
    tag: latest
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 256Mi

worker:
  enabled: true
  replicaCount: 2
  image:
    repository: medcrm/worker
    tag: latest
  resources:
    limits:
      cpu: 1500m
      memory: 2048Mi
    requests:
      cpu: 200m
      memory: 512Mi
