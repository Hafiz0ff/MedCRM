name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-format-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public

      - name: Run ESLint
        run: npm run lint

      - name: Check Formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: medcrm
          POSTGRES_PASSWORD: medcrm_password
          POSTGRES_DB: medcrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Scheduling Database
        run: |
          postgres_container="$(docker ps --format "{{.ID}} {{.Image}}" | awk '/postgres/ {print $1; exit}')"
          docker exec "$postgres_container" createdb -U medcrm medcrm_scheduling

      - name: Generate Prisma Client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public

      - name: Run Prisma DB migrations
        run: npm run prisma:migrate
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public

      - name: Validate Prisma Schemas
        run: npm run prisma:validate
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public

      - name: Run Gateway Unit Tests
        run: npm --workspace backend run test:gateway

      - name: Run Backend E2E Tests
        run: npm --workspace backend run test:e2e
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: supersecretjwtkeyforcitestingonly
          PORT: 3001

  test-frontend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: medcrm
          POSTGRES_PASSWORD: medcrm_password
          POSTGRES_DB: medcrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Scheduling Database
        run: |
          postgres_container="$(docker ps --format "{{.ID}} {{.Image}}" | awk '/postgres/ {print $1; exit}')"
          docker exec "$postgres_container" createdb -U medcrm medcrm_scheduling

      - name: Generate Prisma Client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public

      - name: Run Prisma DB migrations
        run: npm run prisma:migrate
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public

      - name: Validate Prisma Schemas
        run: npm run prisma:validate
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public

      - name: Seed Database
        run: npm run prisma:seed
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public

      - name: Run Unit Tests
        run: npm --workspace frontend run test

      - name: Build Backend Apps
        run: npm --workspace backend run build

      - name: Start Auth Service
        run: node backend/dist/apps/auth-service/main.js &
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: supersecretjwtkeyforcitestingonly
          PORT: 3001

      - name: Start API Gateway
        run: node backend/dist/apps/api-gateway/main.js &
        env:
          PORT: 3000
          AUTH_SERVICE_URL: http://localhost:3001
          AUTH_SERVICE_INTERNAL_URL: http://localhost:3001

      - name: Build Frontend
        run: npm --workspace frontend run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_REALTIME_URL: http://localhost:3000
          INTERNAL_API_URL: http://localhost:3000

      - name: Start Frontend
        run: npm --workspace frontend run start &
        env:
          PORT: 3002

      - name: Wait for services to be ready
        run: |
          npx wait-on http://localhost:3001/health
          npx wait-on http://localhost:3000/health
          npx wait-on http://localhost:3002/api/health

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E Tests
        run: npm --workspace frontend run test:e2e
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_REALTIME_URL: http://localhost:3000

  docker-smoke-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Auth Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/infrastructure/docker/Dockerfile
          build-args: |
            APP_NAME=auth-service
          push: false
          tags: medcrm-auth-service:latest

      - name: Build API Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/infrastructure/docker/Dockerfile
          build-args: |
            APP_NAME=api-gateway
          push: false
          tags: medcrm-api-gateway:latest

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: medcrm-frontend:latest

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Audit NPM Dependencies
        run: npm run security:audit

  prisma-drift:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: medcrm
          POSTGRES_PASSWORD: medcrm_password
          POSTGRES_DB: medcrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Prisma Formatting
        run: npx prettier --check backend/prisma/schema backend/apps/scheduling-service/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public

      - name: Validate Prisma Schemas
        run: npm run prisma:validate
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public

      - name: Create Prisma Shadow Databases
        run: |
          postgres_container="$(docker ps --format "{{.ID}} {{.Image}}" | awk '/postgres/ {print $1; exit}')"
          docker exec "$postgres_container" createdb -U medcrm medcrm_scheduling
          docker exec "$postgres_container" createdb -U medcrm medcrm_shadow
          docker exec "$postgres_container" createdb -U medcrm medcrm_scheduling_shadow

      - name: Check Prisma Migration Drift
        run: npm run prisma:drift
        env:
          DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm?schema=public
          SCHEDULING_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling?schema=public
          SHADOW_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_shadow?schema=public
          SCHEDULING_SHADOW_DATABASE_URL: postgresql://medcrm:medcrm_password@localhost:5432/medcrm_scheduling_shadow?schema=public

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
